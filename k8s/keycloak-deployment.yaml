apiVersion: apps/v1
kind: Deployment

metadata:
  name: keycloak
  namespace: keycloak

spec:
  replicas: 1

  selector:
    matchLabels:
      app: keycloak

  template:
    metadata:
      labels:
        app: keycloak

    spec:
      containers:
      - name: keycloak

        image: quay.io/keycloak/keycloak:26.3

        args:
        - start-dev

        ports:
        - containerPort: 8080

        env:
        - name: KC_DB
          value: postgres

        - name: KC_DB_URL
          value: jdbc:postgresql://postgres:5432/keycloak

        - name: KC_DB_USERNAME
          value: keycloak

        - name: KC_DB_PASSWORD
          value: secret

        - name: KEYCLOAK_ADMIN
          value: admin

        - name: KEYCLOAK_ADMIN_PASSWORD
          value: secret