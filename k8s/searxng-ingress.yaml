apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: searxng
  namespace: search

spec:
  ingressClassName: nginx

  rules:
  - host: search.local

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: searxng

            port:
              number: 80
