apiVersion: v1
kind: ConfigMap

metadata:
  name: searxng-settings
  namespace: search

data:
  settings.yml: |
    use_default_settings: true
    search:
      formats:
        - html
        - json
    outgoing:
      useragent_suffix: ""
      request_timeout: 10
      max_request_timeout: 20
    server:
      bind_address: "0.0.0.0"
      port: 8080
      secret_key: "change-this-to-a-random-string-in-production"
      base_url: "http://localhost:8080/"
      image_proxy: true
