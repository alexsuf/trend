apiVersion: apps/v1
kind: Deployment
metadata:
  name: trend-research-worker
  namespace: trend
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: trend-research-worker
  template:
    metadata:
      labels:
        app: trend-research-worker
    spec:
      hostAliases:
        - ip: 10.111.129.2
          hostnames:
            - "auth.trend-app"
            - "web.trend-app"
      containers:
        - name: trend-research-worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          env:
            - name: TZ
              value: {{ .Values.worker.env.TZ | quote }}
            - name: DATABASE_URL
              value: {{ .Values.worker.env.DATABASE_URL | quote }}
            - name: PGTZ
              value: {{ .Values.worker.env.PGTZ | quote }}
            - name: LLM_BASE_URL
              value: {{ .Values.worker.env.LLM_BASE_URL | quote }}
            - name: LLM_MODEL
              value: {{ .Values.worker.env.LLM_MODEL | quote }}
            - name: SEARXNG_URL
              value: {{ .Values.worker.env.SEARXNG_URL | quote }}
            - name: WORKER_POLL_INTERVAL
              value: {{ .Values.worker.env.WORKER_POLL_INTERVAL | quote }}
          command: ["python", "worker.py"]
          resources:
{{ toYaml .Values.worker.resources | indent 12 }}