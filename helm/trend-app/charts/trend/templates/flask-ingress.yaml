{{- if .Values.ingress.flask.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trend-research
  namespace: trend
  annotations:
{{- range $key, $value := .Values.ingress.flask.annotations }}
    {{ $key }}: "{{ $value }}"
{{- end }}
spec:
  ingressClassName: {{ .Values.ingress.flask.ingressClassName }}
  rules:
  {{- range .Values.ingress.flask.hosts }}
    - host: {{ .host }}
      http:
        paths:
  {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ .backend.service.name }}
                port:
                  number: {{ .backend.service.port.number }}
  {{- end }}
  {{- end }}
{{- end }}