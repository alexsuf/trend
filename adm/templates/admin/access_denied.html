{% extends "admin/base.html" %}

{% block title %}Доступ запрещён{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 60vh;">
    <div class="card text-center" style="max-width: 500px; width: 100%;">
        <div class="card-body py-5">
            <div class="mb-4">
                <i class="bi bi-shield-lock-fill text-danger" style="font-size: 4rem;"></i>
            </div>
            <h2 class="card-title mb-3">Доступ запрещён</h2>
            <p class="card-text text-muted fs-5">Вы не имеете полномочий использовать эту программу</p>
            <hr class="my-4">
            <p class="small text-muted">Вы будете автоматически разлогинены через <span id="countdown">5</span> сек.</p>
            <a href="/logout" class="btn btn-outline-secondary mt-2">
                <i class="bi bi-box-arrow-right"></i> Выйти сейчас
            </a>
        </div>
    </div>
</div>

<script>
    let seconds = 5;
    const countdown = document.getElementById('countdown');
    const interval = setInterval(() => {
        seconds--;
        if (countdown) countdown.textContent = seconds;
        if (seconds <= 0) {
            clearInterval(interval);
            window.location.href = '/logout';
        }
    }, 1000);
</script>
{% endblock %}
