{% extends "admin/base.html" %}

{% block title %}Группы LLM - Admin Panel{% endblock %}

{% block content %}
<h2 class="mb-4">{{ group.id | default('Новая группа', true) }}</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Название</label>
                <input type="text" name="name" class="form-control" value="{{ group.name if group else '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control" rows="3">{{ group.description if group else '' }}</textarea>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="enabled" class="form-check-input" id="enabled" {% if not group or group.enabled %}checked{% endif %}>
                <label class="form-check-label" for="enabled">Активна</label>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/groups" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
