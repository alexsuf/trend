{% extends "admin/base.html" %}

{% block title %}Добавить фолбэк - Admin Panel{% endblock %}

{% block content %}
<h2 class="mb-4">Добавить фолбэк</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Основная модель</label>
                <select name="model_id" class="form-select" required>
                    <option value="">-- Выберите --</option>
                    {% for m in models %}
                    <option value="{{ m.id }}">{{ m.display_name or m.model_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Фолбэк модель</label>
                <select name="fallback_model_id" class="form-select" required>
                    <option value="">-- Выберите --</option>
                    {% for m in models %}
                    <option value="{{ m.id }}">{{ m.display_name or m.model_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Приоритет</label>
                <input type="number" name="priority" class="form-control" value="{{ relation.priority if relation else '1' }}">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/fallbacks" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
