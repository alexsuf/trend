{% extends "admin/base.html" %}

{% block title %}Добавить связь - Admin Panel{% endblock %}

{% block content %}
<h2 class="mb-4">Добавить пользователя в группу</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Пользователь</label>
                <select name="user_id" class="form-select" required>
                    <option value="">-- Выберите --</option>
                    {% for u in users %}
                    <option value="{{ u.id }}">{{ u.username or u.keycloak_id }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Группа</label>
                <select name="group_id" class="form-select" required>
                    <option value="">-- Выберите --</option>
                    {% for g in groups %}
                    <option value="{{ g.id }}">{{ g.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/user-groups" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
