{% extends "admin/base.html" %}

{% block title %}Модели агентов - Admin Panel{% endblock %}

{% block content %}
<h2 class="mb-4">{{ relation.id | default('Новая запись', true) }}</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Имя агента</label>
                <input type="text" name="agent_name" class="form-control" value="{{ relation.agent_name if relation else '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Модель</label>
                <select name="model_id" class="form-select" required>
                    {% for m in models %}
                    <option value="{{ m.id }}" {% if relation and relation.model_id == m.id %}selected{% endif %}>{{ m.provider.name if m.provider else '-' }} - {{ m.display_name or m.model_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/agent-models" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
