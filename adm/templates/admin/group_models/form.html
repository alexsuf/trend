{% extends "admin/base.html" %}

{% block title %}Добавить модель группы - Admin Panel{% endblock %}

{% block content %}
<h2 class="mb-4">Добавить модель в группу</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Группа</label>
                <select name="group_id" class="form-select" required>
                    <option value="">-- Выберите --</option>
                    {% for g in groups %}
                    <option value="{{ g.id }}">{{ g.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Модель</label>
                <select name="model_id" class="form-select" required>
                    <option value="">-- Выберите --</option>
                    {% for m in models %}
                    <option value="{{ m.id }}">{{ m.provider.name if m.provider else '-' }} - {{ m.display_name or m.model_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="is_default" class="form-check-input" id="is_default">
                <label class="form-check-label" for="is_default">Модель по умолчанию для группы</label>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/group-models" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
