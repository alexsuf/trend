{% extends "app/base.html" %}

{% block title %}Новый запрос - Trend Research{% endblock %}

{% block content %}
<h2 class="mb-4">Новый запрос</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Запрос</label>
                <textarea name="prompt" class="form-control" rows="4" required placeholder="Опишите, что нужно исследовать...">{{ request.form.get('prompt', '') }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Модель</label>
                <input type="hidden" name="model_id" value="{{ default_model_id }}">
                <p class="form-control-plaintext">
                    <strong>{{ default_model_label }}</strong>
                    {% if not default_model_id %}
                    <span class="text-muted">(модель по умолчанию для вашей группы не настроена — обратитесь к администратору)</span>
                    {% endif %}
                </p>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary" {% if not default_model_id %}disabled{% endif %}>
                    <i class="bi bi-play-circle"></i> Запустить исследование
                </button>
                <a href="/history" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
