{% extends "app/base.html" %}

{% block title %}Новый запрос - Trend Research{% endblock %}

{% block content %}
<h2 class="mb-4">Новый запрос</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Запрос</label>
                <textarea name="prompt" class="form-control" rows="4" required placeholder="Опишите, что нужно исследовать...">{{ request.form.get('prompt', '') }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Модель</label>
                <select name="model_id" class="form-select" required>
                    <option value="">-- Выберите модель --</option>
                    {% for m in models %}
                    <option value="{{ m.id }}" {{ 'selected' if request.form.get('model_id') == m.id }}>
                        {{ m.provider.name if m.provider else '-' }} - {{ m.display_name or m.model_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Отправить запрос</button>
                <a href="/history" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
