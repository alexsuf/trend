<!DOCTYPE html>
<html>
<head>
    <title>Профиль - Trend Research App</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <div class="container">
        <h1>Профиль пользователя</h1>
        
        {% if user %}
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{ user.name }}</h5>
                    <p class="card-text">Имя пользователя: {{ user.username }}</p>
                    <p class="card-text">Email: {{ user.email }}</p>
                    <p class="card-text">Роли: 
                        {% if user.roles %}
                            {{ user.roles | join(', ') }}
                        {% else %}
                            Нет ролей
                        {% endif %}
                    </p>
                </div>
            </div>
            <a href="/" class="btn btn-primary mt-3">На главную</a>
            <a href="/logout" class="btn btn-secondary mt-3">Выйти</a>
        {% else %}
            <p>Пользователь не авторизован.</p>
            <a href="/login" class="btn btn-primary">Войти</a>
        {% endif %}
    </div>
</body>
</html>
